<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiParent | Support</title>
    <style>
        :root {
            --bg: #0A0A0F;
            --card: #141420;
            --text: #FFFFFF;
            --muted: #8E8E93;
            --accent: #6C63FF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #2C2C3E;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: -0.5px; }
        p { color: var(--muted); font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .footer { margin-top: 40px; font-size: 13px; color: var(--muted); }
        .footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PiParent Support</h1>
        <p>Need help with your family controls, or discovered a bug? Please open a support ticket on our official repository or reach out via email.</p>
        
        <a href="https://github.com/agupta-ghub/PiParent/issues" class="btn" target="_blank">Open Support Ticket</a>
        
        <div style="margin-top: 24px;">
            <a href="mailto:deejay.gators_5c@icloud.com" style="color: var(--muted); font-size: 14px;">Contact Support via Email</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 PiParent. All rights reserved. | 
        <a href="https://github.com/agupta-ghub/PiParent" target="_blank">Repository</a>
    </div>

</body>
</html>
